name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build EventProcessor.slnx -c Debug

      - name: Test
        run: |
          dotnet test EventProcessor.slnx -c Debug --no-build \
            --logger "html;LogFileName=TestResults.html" \
            --results-directory out/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: out/TestResults/TestResults.html
